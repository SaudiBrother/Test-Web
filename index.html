<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4DD0E1">
    <meta name="description" content="Lrc Music Player - Full Offline & Full Kostumisasi, pemutar musik dengan lirik multi-bahasa">
    <meta name="keywords" content="lrc, music player, offline, lyrics, customizable">
    <title>🎵 Lrc Music Player — Full Offline</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><circle cx='90' cy='90' r='80' fill='%234DD0E1'/><path d='M70 50 L130 80 L70 110 Z' fill='white'/></svg>">
</head>
<body>
    <!-- Ambient background -->
    <div class="bg-particles"></div>
    <a href="#player" class="skip-link">⬇️ Lewati ke player</a>

    <!-- Penanda buku kecil: panel kontrol -->
    <div class="top-controls" role="toolbar" aria-label="Kontrol utama">
        <button class="bookmark-tab" id="panelToggleBtn" aria-label="Buka panel kontrol" title="Panel Kontrol">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9" />
            </svg>
        </button>
        <div class="control-panel" id="controlPanel" aria-hidden="true">
            <div class="panel-section themes">
                <span class="panel-label">Tema</span>
                <div class="theme-options">
                    <button class="theme-option active" data-theme="dark" aria-label="Tema Gelap">Gelap</button>
                    <button class="theme-option" data-theme="light" aria-label="Tema Terang">Terang</button>
                    <button class="theme-option" data-theme="blue" aria-label="Tema Biru Animasi">Biru</button>
                </div>
            </div>
            <div class="panel-section action">
                <button class="panel-add-btn" id="addSongPanelBtn" aria-label="Tambah lagu baru" title="Tambah Lagu">
                    <svg class="add-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <path class="plus" d="M12 5v14M5 12h14" />
                        <path class="cross" d="M18 6L6 18M6 6l12 12" style="display:none;" />
                    </svg>
                </button>
                <span class="panel-label">Tambah</span>
            </div>
        </div>
    </div>

    <!-- Sidebar Playlist -->
    <div class="sidebar-overlay" id="sidebarOverlay" role="presentation"></div>
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Daftar lagu">
        <h2 class="sidebar-header">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            Daftar Lagu
        </h2>
        <div id="playlistContainer" role="region" aria-label="Playlist songs">
            <p class="empty-text">Belum ada lagu</p>
        </div>
        <button class="btn-add-song" id="addSongSidebarBtn" aria-label="Tambah lagu baru">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            Tambah Lagu
        </button>
    </aside>

    <!-- Main App -->
    <main class="app-main" id="player" role="main">
        <div class="hero-center">
            <h1 class="breathing-title">Lrc Music Player</h1>
            <p class="hero-sub">Full Offline & Full Kostumisasi</p>
        </div>

        <div class="content-card player-card" role="region" aria-label="Pemutar musik">
            <div class="now-playing" id="nowPlaying" aria-live="polite">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                <span>Pilih atau tambah lagu</span>
            </div>

            <audio id="audio" preload="auto" crossorigin="anonymous"></audio>

            <div class="progress-container" role="progressbar" aria-label="Progres lagu">
                <span id="currentTime" class="time">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                    <input type="range" id="seekSlider" class="seek-slider" min="0" max="100" step="0.1" value="0" aria-label="Seek bar">
                </div>
                <span id="duration" class="time">0:00</span>
            </div>

            <div class="player-controls" role="group" aria-label="Kontrol pemutar">
                <button class="control-btn" id="prevBtn" aria-label="Lagu sebelumnya"><svg viewBox="0 0 24 24" class="btn-icon"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" fill="currentColor"/></svg></button>
                <button class="control-btn play-btn" id="playBtn" aria-label="Putar/Jeda"><svg viewBox="0 0 24 24" class="btn-icon play-icon"><path class="play-path" d="M8 5v14l11-7z" fill="currentColor" /><path class="pause-path" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor" style="display:none;" /></svg></button>
                <button class="control-btn" id="nextBtn" aria-label="Lagu berikutnya"><svg viewBox="0 0 24 24" class="btn-icon"><path d="M6 18l8.5-6L6 6v12zm10-12h2v12h-2V6z" fill="currentColor"/></svg></button>
            </div>

            <div class="volume-control" role="group" aria-label="Kontrol volume">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="vol-icon"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /></svg>
                <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.05" value="0.7" aria-label="Volume">
            </div>
        </div>

        <div class="lyrics-grid" id="lyricsGrid" role="region" aria-label="Lirik lagu">
            <p class="empty-text" style="grid-column:1/-1;">📝 Lirik akan muncul di sini</p>
        </div>
    </main>

    <!-- Modal Tambah Lagu -->
    <div class="modal" id="addModal" role="dialog" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-content">
            <h2 id="modalTitle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                Tambah Lagu Baru
            </h2>
            <div class="form-group">
                <label for="audioFileInput">🎵 File Audio</label>
                <input type="file" id="audioFileInput" accept="audio/*" required aria-required="true">
            </div>
            <div id="lyricInputsContainer" role="group" aria-label="Kolom lirik"></div>
            <div class="form-actions">
                <button type="button" id="addLyricColumnBtn" class="btn-secondary">+ Kolom Lirik</button>
                <button type="button" id="removeLyricColumnBtn" class="btn-secondary">− Kolom</button>
            </div>
            <div class="modal-footer">
                <button type="button" id="cancelAddBtn" class="btn-secondary">Batal</button>
                <button type="button" id="saveSongBtn" class="btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Simpan Lagu
                </button>
            </div>
        </div>
    </div>

    <footer class="app-footer" role="contentinfo">
        <p>Lrc Music Player — Full Offline & Full Kostumisasi</p>
    </footer>

    <script src="js/script.js" defer></script>
</body>
    </html>
